CONFIG_NOXTLS=y
CONFIG_NOXTLS_PROFILE_MINIMAL_TLS_CLIENT=y

CONFIG_PRINTK=y
CONFIG_MAIN_STACK_SIZE=8192

CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_NOXTLS_USE_ZEPHYR_ENTROPY=y
CONFIG_COMMON_LIBC_MALLOC=y

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y
CONFIG_NET_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER=y

# Leave disabled for Twister; set y for manual TLS handshake testing.
# CONFIG_NOXTLS_SAMPLE_TLS_CONNECT=y
